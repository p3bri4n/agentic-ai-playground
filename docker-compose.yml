services:

  # ──────────────────────────────────────────────────────────────
  # Interface
  # ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"          # seule interface exposée côté hôte
    environment:
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}   # fixe : sans ça, chaque recréation du conteneur invalide les sessions
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://langgraph-agent:8000/v1
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - langgraph-agent
    networks:
      - agent-net

  # ──────────────────────────────────────────────────────────────
  # Orchestration globale
  # ──────────────────────────────────────────────────────────────
  langgraph-agent:
    build: ./services/langgraph-agent
    container_name: langgraph-agent
    restart: unless-stopped
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://tabbyapi:5000/v1}
      - SKILL_MANAGER_URL=http://skill-manager:8001
      - CONTEXT_MANAGER_URL=http://context-manager:8002
      - MCP_CLIENT_URL=http://mcp-client:8003
      # Journal d'audit des tool_calls TIER_REVERSIBLE (Phase 2, voir README
      # section Supervision humaine) : /workspace/.audit, sur le même bind
      # mount que les autres serveurs MCP filesystem/git/terminal.
      - AUDIT_LOG_DIR=/workspace/.audit
      # Conversion PNG par défaut (aucune valeur = passe par _to_png_data_uri) :
      # le backend par défaut (TabbyAPI/ExLlamaV3) n'est pas connu pour décoder
      # le WebP nativement (à vérifier empiriquement, voir plan d'implémentation
      # tabbyapi). "webp" ne s'active que pour le backend alternatif
      # llama-server, dont le fork llama.cpp décode le WebP nativement — voir
      # tableau des bugs du README.
      - IMAGE_FORMAT_PASSTHROUGH=${IMAGE_FORMAT_PASSTHROUGH:-}
      # Qwen3.6 raisonne par défaut sur chaque tour : coûteux pour la boucle
      # perception-action rapide capture/clic de GhostDesk. Injecte /no_think
      # dans le system prompt quand tous les tool_calls du tour précédent
      # sont auto-approuvés (voir approval_policy.py) ; laisse le
      # raisonnement normal sinon (première décision d'un tour, tool
      # sensible...). Voir app/graph.py, _adaptive_thinking_directive.
      - ADAPTIVE_THINKING=${ADAPTIVE_THINKING:-true}
      # Filet de sécurité (voir README, tableau des bugs) : certains modèles
      # écrivent parfois leur appel d'outil en prose au lieu d'un tool_calls
      # structuré, piégé dans le raisonnement. Nombre de relances
      # automatiques avant d'abandonner et d'afficher une notice, une fois
      # la récupération de secours (_extract_fallback_tool_call) elle-même
      # infructueuse. Budget cumulé pour toute la tâche, comme
      # MAX_TOOL_ITERATIONS.
      - MAX_EMPTY_ANSWER_RETRIES=${MAX_EMPTY_ANSWER_RETRIES:-1}
      # Plafond de tours d'outils par tâche avant la notice de limite (voir
      # app/graph.py). Pas de passthrough env avant le harnais
      # tests_integration/test_web_tasks.py (Campagne B, budget relevé pour
      # isoler l'effet du plafond des vraies capacités de navigation —
      # voir BENCHMARK0.md).
      - MAX_TOOL_ITERATIONS=${MAX_TOOL_ITERATIONS:-20}
      # Forfait de tokens par image dans la décomposition approximative du
      # contexte (POST /context, voir README section Observabilité) — un
      # compte exact dépendrait du tokenizer visuel du modèle servi, hors
      # périmètre pour un simple ordre de grandeur affiché sur le dashboard.
      - IMAGE_TOKEN_ESTIMATE=${IMAGE_TOKEN_ESTIMATE:-1500}
    volumes:
      - ./workspace:/workspace
    depends_on:
      - skill-manager
      - context-manager
      - mcp-client
      - tabbyapi
    networks:
      - agent-net
    # pas de port publié : uniquement accessible via le réseau interne

  # ──────────────────────────────────────────────────────────────
  # Dashboard : cockpit d'observabilité local (voir README, section
  # Observabilité) — agrège en best-effort les métriques llama-server
  # (/metrics, /slots), la composition du contexte de langgraph-agent
  # (POST /context, GET /threads/recent) et la VRAM des GPU (nvidia-smi,
  # ENABLE_GPU_STATS). Seul service dont le port est publié sur l'hôte, à
  # part Open WebUI — tout le reste (llama-server, langgraph-agent...)
  # n'est joignable que via le réseau interne agent-net, d'où l'agrégation
  # côté backend plutôt que des appels directs depuis le navigateur.
  # ──────────────────────────────────────────────────────────────
  dashboard:
    build: ./services/dashboard
    container_name: dashboard
    restart: unless-stopped
    environment:
      # Overridable (contrairement aux autres URLs internes de ce compose,
      # toujours en dur) : llama-server n'est plus démarré par défaut depuis
      # la migration vers TabbyAPI (voir section Inférence plus bas) — cette
      # source reste en best-effort (section `null` sans erreur, voir
      # app/main.py) tant que llama-server n'est pas explicitement réactivé.
      # Pas d'équivalent /metrics/{slots} pour TabbyAPI à ce jour.
      - LLAMA_SERVER_URL=${LLAMA_SERVER_URL:-http://llama-server:8000}
      - LANGGRAPH_AGENT_URL=http://langgraph-agent:8000
      # VRAM par GPU (nvidia-smi) : désactivé par défaut, nécessite le
      # runtime nvidia (voir bloc "deploy" commenté plus bas, à décommenter
      # ensemble avec cette variable).
      - ENABLE_GPU_STATS=${ENABLE_GPU_STATS:-false}
    ports:
      - "${DASHBOARD_PORT:-8090}:8090"
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8090/health', timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    depends_on:
      - langgraph-agent
    networks:
      - agent-net
    # Décommenter avec ENABLE_GPU_STATS=true (.env) pour exposer nvidia-smi
    # dans ce conteneur (image python:3.12-slim, sans binaire nvidia-smi tant
    # que le runtime nvidia n'est pas déclaré ici — même mécanisme que
    # llama-server/ollama plus bas, mais optionnel pour ce service qui n'a
    # sinon besoin d'aucun accès GPU).
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ──────────────────────────────────────────────────────────────
  # Skill Manager (skills/ python, fastapi, docker, clean-code)
  # ──────────────────────────────────────────────────────────────
  skill-manager:
    build: ./services/skill-manager
    container_name: skill-manager
    restart: unless-stopped
    volumes:
      - ./skills:/app/skills:ro
    networks:
      - agent-net

  # ──────────────────────────────────────────────────────────────
  # Context Manager : RAG (LlamaIndex) / mémoire (Mem0) /
  # compression (LLMLingua) / reranking
  # ──────────────────────────────────────────────────────────────
  context-manager:
    build: ./services/context-manager
    container_name: context-manager
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LLM_BASE_URL=${LLM_BASE_URL:-http://tabbyapi:5000/v1}
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - agent-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - agent-net
    # décommenter pour debug via l'UI Qdrant (http://localhost:6335/dashboard)
    # ports:
    #   - "6335:6333"

  # ──────────────────────────────────────────────────────────────
  # MCP Client : point d'entrée unique vers les serveurs MCP
  # ──────────────────────────────────────────────────────────────
  mcp-client:
    build: ./services/mcp-client
    container_name: mcp-client
    restart: unless-stopped
    environment:
      # mcp-client spawne ces conteneurs à la demande via le socket Docker
      # (transport stdio, conforme à l'usage officiel des images mcp/*)
      - MCP_FILESYSTEM_IMAGE=mcp/filesystem:latest
      - MCP_GIT_IMAGE=mcp/git:latest
      - MCP_TERMINAL_IMAGE=mcp-terminal:local   # construite localement, voir plus bas
      - WORKSPACE_HOST_PATH=${WORKSPACE_HOST_PATH}    # chemin HOTE requis par docker run -v
      # GhostDesk (serveur "desktop") : contrairement aux autres, c'est un
      # serveur HTTP persistant (bureau virtuel), pas un conteneur spawné à
      # la demande — mcp-client s'y connecte en Streamable HTTP.
      - MCP_GHOSTDESK_URL=http://ghostdesk:3000/mcp
      # "browser" (Playwright) : serveur HTTP persistant lui aussi (service
      # playwright-mcp ci-dessous), pas un spawn éphémère par appel — voir
      # BUGS.md (perte de continuité d'état entre deux appels d'outils).
      - MCP_PLAYWRIGHT_URL=http://playwright-mcp:8931/mcp
      - GHOSTDESK_AUTH_TOKEN=${GHOSTDESK_AUTH_TOKEN}
      # Requis par les modèles Qwen pour que leurs clics tombent sur la bonne
      # cible (voir .env.example) ; ${VAR:-1000} plutôt que ${VAR} pour
      # garder ce défaut même si la variable est absente du .env.
      - GHOSTDESK_MODEL_SPACE=${GHOSTDESK_MODEL_SPACE:-1000}
      # OCR d'appoint (services/ocr-service) : serveur HTTP persistant lui
      # aussi, comme GhostDesk (voir plus bas). Pas de header
      # GhostDesk-Model-Space pour ce serveur : ocr-service convertit déjà
      # ses coordonnées vers 0-1000 lui-même avant de répondre.
      - MCP_OCR_URL=http://ocr-service:8004/mcp
      - OCR_AUTH_TOKEN=${OCR_AUTH_TOKEN}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # ⚠️ équivaut à un accès root sur l'hôte,
                                                       # voir avertissement de sécurité dans le README
      - ./workspace:/workspace
    depends_on:
      ghostdesk:
        condition: service_started
      ocr-service:
        condition: service_started
      playwright-mcp:
        condition: service_healthy
    networks:
      - agent-net

  # --- Image du serveur MCP "Terminal" ---------------------------
  # ⚠️ Il n'existe pas d'image MCP "Terminal" officielle (ni chez
  # Anthropic/modelcontextprotocol, ni chez Docker) : l'exécution shell
  # arbitraire est volontairement absente des serveurs de référence.
  # Cette image est construite localement puis spawnée à la demande par
  # mcp-client, avec le même hardening qu'un conteneur classique.
  mcp-terminal-build:
    build: ./services/mcp-terminal
    image: mcp-terminal:local
    container_name: mcp-terminal-build
    profiles: ["build-only"]   # ce service ne se lance jamais, il sert juste à builder l'image
    command: ["true"]

  # --- Playwright MCP : navigateur piloté par l'agent (serveur HTTP) --
  # ⚠️ Anciennement spawné à la demande par mcp-client (`docker run --rm`
  # par appel d'outil) : chaque appel repartait sur `about:blank` sans
  # continuité d'état avec le précédent (voir BUGS.md). L'image officielle
  # mcp/playwright supporte un mode serveur HTTP natif (`--port`, endpoint
  # Streamable HTTP `/mcp`) ; on l'utilise ici comme service persistant,
  # même patron que GhostDesk/OCR ci-dessous.
  playwright-mcp:
    image: mcp/playwright:latest
    container_name: playwright-mcp
    restart: unless-stopped
    command:
      - --host=0.0.0.0
      - --port=8931
      # Host header attendu = nom DNS docker-compose du service : évite le
      # 403 par défaut (l'image ne sert que "localhost:<port>" sinon), sans
      # ouvrir à '*' puisque ce service n'est joignable que sur agent-net.
      - --allowed-hosts=playwright-mcp:8931
      - --isolated   # profil navigateur en mémoire, jamais persisté sur disque
      - --headless
      - --browser=chromium
      # Chemin EXPLICITE (voir HISTORY.md "Phase 1d-révisée", T5) plutôt que
      # le défaut implicite (~/.playwright-mcp du conteneur) — l'agent
      # fabriquait régulièrement de mauvais chemins en devinant ce défaut
      # (/app/.playwright-mcp, /.playwright-mcp...), jamais le vrai. Partagé
      # en LECTURE SEULE avec le serveur MCP filesystem ci-dessous (volume
      # agent-downloads) : on partage l'artefact téléchargé, jamais l'état du
      # profil navigateur (--isolated reste actif).
      - --output-dir=/downloads
    volumes:
      - agent-downloads:/downloads
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/8931' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - agent-net
    # pas de port publié : uniquement accessible via le réseau interne (mcp-client)

  # --- GhostDesk : bureau virtuel complet piloté par l'agent ------
  # ⚠️ Surface d'attaque bien plus large que mcp-terminal : SYS_ADMIN +
  # exécution shell + contrôle GUI complet. Reste un serveur MCP HTTP
  # persistant avec état (pas un conteneur éphémère comme les autres) ;
  # voir avertissement détaillé et limites assumées dans le README.
  ghostdesk:
    image: ghcr.io/yv17labs/ghostdesk:latest
    container_name: ghostdesk
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN   # requis par Electron/apps complexes dans le bureau virtuel
    environment:
      - GHOSTDESK_AUTH_TOKEN=${GHOSTDESK_AUTH_TOKEN}
      - GHOSTDESK_VNC_PASSWORD=${GHOSTDESK_VNC_PASSWORD}
    volumes:
      - ghostdesk-home:/home/agent   # persiste le bureau/apps entre redémarrages
    ports:
      - "6080:6080"   # noVNC — exposé par défaut pour observer l'agent piloter le bureau
    healthcheck:
      # Port MCP (3000, voir plus bas) : ocr-service en dépend (condition
      # service_healthy) pour ne capturer qu'une fois GhostDesk réellement prêt
      # à répondre, pas seulement démarré (depends_on seul ne garantit que
      # l'ordre de démarrage des conteneurs, voir README tableau des bugs pour
      # un précédent similaire avec Qdrant).
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/3000' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - agent-net
    # Port MCP (3000) volontairement non publié sur l'hôte : seuls mcp-client
    # et ocr-service doivent l'atteindre, via le réseau interne agent-net.

  # --- OCR d'appoint : PaddleOCR CPU (find_text/read_screen) ------
  # Grounding du VLM (Qwen3.6 MoE) : raisonne bien mais localise mal un
  # élément à l'écran (sans OCR/détection d'éléments UI dédiée, voir README
  # section OCR d'appoint et Limites connues assumées). Serveur MCP HTTP
  # persistant comme GhostDesk ci-dessus (pas un conteneur spawné à la
  # demande par mcp-client) : il se connecte lui-même à GhostDesk pour
  # capturer l'écran, indépendamment de mcp-client/langgraph-agent.
  ocr-service:
    build: ./services/ocr-service
    container_name: ocr-service
    restart: unless-stopped
    environment:
      - MCP_GHOSTDESK_URL=http://ghostdesk:3000/mcp
      - GHOSTDESK_AUTH_TOKEN=${GHOSTDESK_AUTH_TOKEN}
      - OCR_AUTH_TOKEN=${OCR_AUTH_TOKEN}
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:8004/health', timeout=3)\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      ghostdesk:
        condition: service_healthy
    networks:
      - agent-net
    # pas de port publié : uniquement accessible via le réseau interne (mcp-client)

  # ──────────────────────────────────────────────────────────────
  # Inférence
  # ──────────────────────────────────────────────────────────────
  # Backend par défaut : TabbyAPI (image officielle ghcr.io/theroyallab/
  # tabbyapi, backend ExLlamaV3) servant Qwen3.6-27B en quantisation EXL3
  # (variante VL, vision préservée pour GhostDesk/OCR) avec MTP natif
  # (draft_mode: mtp dans services/tabbyapi/config.yml, pas de modèle de
  # draft séparé). Remplace llama-server comme défaut : ce dernier restait
  # bloqué par un bug de synchronisation inter-GPU confirmé dans son fork
  # (voir tests_integration/CUDA-DIAGNOSTIC.md), nécessitant
  # --ubatch-size 128 (~+34% de latence) en mitigation permanente.
  # Multi-GPU (count: all, les deux cartes) : un mono-GPU a été tenté
  # d'abord (contournait le tensor-split hétérogène du fork llama.cpp en le
  # rendant sans objet plutôt que de le réparer) mais ce quant VL 3.50bpw
  # (14,29 Gio de poids seuls + tour vision) ne rentre pas avec la vision
  # activée sur un seul GPU 16 Go, même sur la Blackwell (marge ~822 Mio
  # sans vision). ExLlamaV3 étant un code base différent du fork llama.cpp
  # diagnostiqué, le bug de synchronisation inter-GPU documenté n'a pas de
  # raison de s'y appliquer. llama-server reste disponible comme backend
  # alternatif plus bas (même statut qu'Ollama).
  tabbyapi:
    # Build local minimal (voir services/tabbyapi/Dockerfile) au-dessus de
    # l'image officielle épinglée par digest (":latest" est une rolling
    # release qui ne fige rien dans le temps ; digest résolu et versions
    # réelles constatées dans le conteneur consignées dans RESULTS.md) —
    # ajoute python3-dev, absent de l'image officielle et requis par la
    # compilation JIT Triton au chargement du modèle.
    build: ./services/tabbyapi
    container_name: tabbyapi
    restart: unless-stopped
    volumes:
      - ./services/tabbyapi/config.yml:/app/config.yml:ro
      - ${MODELS_HOST_PATH:-./models}:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              # Choix revu en cours de PoC : mono-GPU (Ada, puis Blackwell)
              # insuffisant pour ce quant avec vision activée (14,29 Gio de
              # poids seuls + tour vision + buffers — restait ~822 Mio de
              # marge SANS vision même sur la Blackwell à cache_size=8192,
              # largement insuffisant pour la tour vision). Passage en
              # multi-GPU (les deux cartes, count: all) pour ce backend —
              # ExLlamaV3, pas le fork llama.cpp diagnostiqué précédemment,
              # le bug de synchronisation inter-GPU documenté dans
              # tests_integration/CUDA-DIAGNOSTIC.md n'a pas de raison de
              # s'appliquer ici (code base différent). gpu_split_auto
              # (défaut TabbyAPI, voir config.yml) répartit automatiquement
              # entre les deux GPU visibles.
              count: all
              capabilities: [gpu]
    networks:
      - agent-net
    # décommenter pour exposer l'API OpenAI-compatible directement sur l'hôte
    # ports:
    #   - "5000:5000"

  # ──────────────────────────────────────────────────────────────
  # Fixtures Benchmark 0 (plan d'autonomie, voir PLAN.md et
  # tests_integration/BENCHMARK0.md) : sites/app auto-hébergés à vérité
  # terrain connue par construction, ciblés par le harnais
  # test_web_tasks.py (T1-T7). Profil dédié : ne tournent jamais par défaut
  # avec le reste de la stack, seulement quand on lance ce harnais.
  #   docker compose --profile test-fixtures up -d fixture-catalog fixture-docs fixture-hr-app
  # ──────────────────────────────────────────────────────────────
  fixture-catalog:
    build: ./services/langgraph-agent/tests_integration/fixtures/catalog
    container_name: fixture-catalog
    profiles: ["test-fixtures"]
    networks:
      - agent-net
    # pas de port publié : seul le conteneur playwright-mcp (agent-net) y accède

  fixture-docs:
    build: ./services/langgraph-agent/tests_integration/fixtures/docs
    container_name: fixture-docs
    profiles: ["test-fixtures"]
    networks:
      - agent-net

  fixture-hr-app:
    build: ./services/langgraph-agent/tests_integration/fixtures/hr-app
    container_name: fixture-hr-app
    profiles: ["test-fixtures"]
    environment:
      # court délibérément (voir T6, BENCHMARK0.md) : teste que l'agent reste
      # efficace dans sa trajectoire plutôt que d'errer avant de répondre.
      - HR_APP_SESSION_TIMEOUT_SECONDS=${HR_APP_SESSION_TIMEOUT_SECONDS:-90}
    volumes:
      # soumissions du formulaire de congé (T2) : écrites ici par l'app,
      # lues par les assertions du harnais depuis l'hôte, jamais par l'app
      # elle-même après écriture.
      - ./workspace/hr-app-data:/data
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:5000/health', timeout=3)\" || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - agent-net

networks:
  agent-net:
    driver: bridge

volumes:
  open-webui-data:
  qdrant-data:
  ghostdesk-home:
  # Volume PARTAGÉ entre playwright-mcp (écriture) et le serveur MCP
  # filesystem spawné par mcp-client (lecture seule) — voir playwright-mcp
  # (--output-dir) et services/mcp-client/app/main.py (SERVERS["filesystem"])
  # ci-dessous, HISTORY.md "Phase 1d-révisée" (T5). On partage les
  # ARTEFACTS de téléchargement, jamais l'état du navigateur : playwright-mcp
  # reste --isolated (profil en mémoire, jamais persisté).
  agent-downloads: