services:

  # ──────────────────────────────────────────────────────────────
  # Interface
  # ──────────────────────────────────────────────────────────────
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: open-webui
    restart: unless-stopped
    ports:
      - "3000:8080"          # seule interface exposée côté hôte
    environment:
      - WEBUI_AUTH=true
      - WEBUI_SECRET_KEY=${WEBUI_SECRET_KEY}   # fixe : sans ça, chaque recréation du conteneur invalide les sessions
      - ENABLE_OPENAI_API=true
      - OPENAI_API_BASE_URL=http://langgraph-agent:8000/v1
    volumes:
      - open-webui-data:/app/backend/data
    depends_on:
      - langgraph-agent
    networks:
      - agent-net

  # ──────────────────────────────────────────────────────────────
  # Orchestration globale
  # ──────────────────────────────────────────────────────────────
  langgraph-agent:
    build: ./services/langgraph-agent
    container_name: langgraph-agent
    restart: unless-stopped
    environment:
      - LLM_BASE_URL=${LLM_BASE_URL:-http://vllm:8000/v1}
      - SKILL_MANAGER_URL=http://skill-manager:8001
      - CONTEXT_MANAGER_URL=http://context-manager:8002
      - MCP_CLIENT_URL=http://mcp-client:8003
      # Journal d'audit des tool_calls TIER_REVERSIBLE (Phase 2, voir README
      # section Supervision humaine) : /workspace/.audit, sur le même bind
      # mount que les autres serveurs MCP filesystem/git/terminal.
      - AUDIT_LOG_DIR=/workspace/.audit
    volumes:
      - ./workspace:/workspace
    depends_on:
      - skill-manager
      - context-manager
      - mcp-client
      - vllm
    networks:
      - agent-net
    # pas de port publié : uniquement accessible via le réseau interne

  # ──────────────────────────────────────────────────────────────
  # Skill Manager (skills/ python, fastapi, docker, clean-code)
  # ──────────────────────────────────────────────────────────────
  skill-manager:
    build: ./services/skill-manager
    container_name: skill-manager
    restart: unless-stopped
    volumes:
      - ./skills:/app/skills:ro
    networks:
      - agent-net

  # ──────────────────────────────────────────────────────────────
  # Context Manager : RAG (LlamaIndex) / mémoire (Mem0) /
  # compression (LLMLingua) / reranking
  # ──────────────────────────────────────────────────────────────
  context-manager:
    build: ./services/context-manager
    container_name: context-manager
    restart: unless-stopped
    environment:
      - QDRANT_URL=http://qdrant:6333
      - LLM_BASE_URL=${LLM_BASE_URL:-http://vllm:8000/v1}
    depends_on:
      qdrant:
        condition: service_healthy
    networks:
      - agent-net

  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks:
      - agent-net
    # décommenter pour debug via l'UI Qdrant (http://localhost:6335/dashboard)
    # ports:
    #   - "6335:6333"

  # ──────────────────────────────────────────────────────────────
  # MCP Client : point d'entrée unique vers les serveurs MCP
  # ──────────────────────────────────────────────────────────────
  mcp-client:
    build: ./services/mcp-client
    container_name: mcp-client
    restart: unless-stopped
    environment:
      # mcp-client spawne ces conteneurs à la demande via le socket Docker
      # (transport stdio, conforme à l'usage officiel des images mcp/*)
      - MCP_FILESYSTEM_IMAGE=mcp/filesystem:latest
      - MCP_GIT_IMAGE=mcp/git:latest
      - MCP_BROWSER_IMAGE=mcp/playwright:latest
      - MCP_TERMINAL_IMAGE=mcp-terminal:local   # construite localement, voir plus bas
      - WORKSPACE_HOST_PATH=${WORKSPACE_HOST_PATH}    # chemin HOTE requis par docker run -v
      # GhostDesk (serveur "desktop") : contrairement aux autres, c'est un
      # serveur HTTP persistant (bureau virtuel), pas un conteneur spawné à
      # la demande — mcp-client s'y connecte en Streamable HTTP.
      - MCP_GHOSTDESK_URL=http://ghostdesk:3000/mcp
      - GHOSTDESK_AUTH_TOKEN=${GHOSTDESK_AUTH_TOKEN}
      # Requis par les modèles Qwen pour que leurs clics tombent sur la bonne
      # cible (voir .env.example) ; ${VAR:-1000} plutôt que ${VAR} pour
      # garder ce défaut même si la variable est absente du .env.
      - GHOSTDESK_MODEL_SPACE=${GHOSTDESK_MODEL_SPACE:-1000}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock   # ⚠️ équivaut à un accès root sur l'hôte,
                                                       # voir avertissement de sécurité dans le README
      - ./workspace:/workspace
    depends_on:
      - ghostdesk
    networks:
      - agent-net

  # --- Image du serveur MCP "Terminal" ---------------------------
  # ⚠️ Il n'existe pas d'image MCP "Terminal" officielle (ni chez
  # Anthropic/modelcontextprotocol, ni chez Docker) : l'exécution shell
  # arbitraire est volontairement absente des serveurs de référence.
  # Cette image est construite localement puis spawnée à la demande par
  # mcp-client, avec le même hardening qu'un conteneur classique.
  mcp-terminal-build:
    build: ./services/mcp-terminal
    image: mcp-terminal:local
    container_name: mcp-terminal-build
    profiles: ["build-only"]   # ce service ne se lance jamais, il sert juste à builder l'image
    command: ["true"]

  # --- GhostDesk : bureau virtuel complet piloté par l'agent ------
  # ⚠️ Surface d'attaque bien plus large que mcp-terminal : SYS_ADMIN +
  # exécution shell + contrôle GUI complet. Reste un serveur MCP HTTP
  # persistant avec état (pas un conteneur éphémère comme les autres) ;
  # voir avertissement détaillé et limites assumées dans le README.
  ghostdesk:
    image: ghcr.io/yv17labs/ghostdesk:latest
    container_name: ghostdesk
    restart: unless-stopped
    shm_size: 2gb
    cap_add:
      - SYS_ADMIN   # requis par Electron/apps complexes dans le bureau virtuel
    environment:
      - GHOSTDESK_AUTH_TOKEN=${GHOSTDESK_AUTH_TOKEN}
      - GHOSTDESK_VNC_PASSWORD=${GHOSTDESK_VNC_PASSWORD}
    volumes:
      - ghostdesk-home:/home/agent   # persiste le bureau/apps entre redémarrages
    ports:
      - "6080:6080"   # noVNC — exposé par défaut pour observer l'agent piloter le bureau
    networks:
      - agent-net
    # Port MCP (3000) volontairement non publié sur l'hôte : seul mcp-client
    # doit l'atteindre, via le réseau interne agent-net.

  # ──────────────────────────────────────────────────────────────
  # Inférence
  # ──────────────────────────────────────────────────────────────
  # ⚠️ vLLM attend un modèle au format HuggingFace natif (dossier avec
  # config.json/tokenizer/*.safetensors) sous ./models, PAS un .gguf : un
  # .gguf isolé (format Ollama/llama.cpp) est réinterprété comme un repo_id
  # HuggingFace mal formé et fait planter vLLM en boucle de redémarrage dès
  # le démarrage (huggingface_hub.errors.HFValidationError). Support GGUF
  # dans vLLM encore expérimental (--quantization gguf), non utilisé ici.
  # Pour du GGUF/quants I-quants, utiliser le backend ollama plus bas à la
  # place (voir LLM_BASE_URL).
  vllm:
    image: vllm/vllm-openai:latest
    container_name: vllm
    restart: unless-stopped
    command:
      - "--model"
      - "/models/Qwen2.5-Coder-32B-Instruct"   # adapter au modèle HF réellement présent dans ./models
      - "--served-model-name"
      - "agent-llm"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8000"
    volumes:
      - ${MODELS_HOST_PATH:-./models}:/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    ipc: host              # requis par vLLM pour le shared memory PyTorch
    networks:
      - agent-net
    # décommenter pour exposer l'API OpenAI-compatible directement sur l'hôte
    # ports:
    #   - "8000:8000"

  # --- Backend alternatif : Ollama (GGUF, quants I-quants/K-quants inclus) --
  # Non utilisé par défaut (voir LLM_BASE_URL, qui pointe sur vllm par
  # défaut) : pour l'activer, définir dans .env
  #   LLM_BASE_URL=http://ollama:11434/v1
  # puis démarrer ce service explicitement (il n'est pas dans les depends_on
  # de langgraph-agent/context-manager, qui restent câblés sur vllm) :
  #   docker compose up -d ollama
  # Après le pull, aliaser le modèle en "agent-llm" pour matcher le nom en
  # dur dans le code (services/langgraph-agent/app/graph.py), avec les
  # paramètres de sampling validés (voir ci-dessous) :
  #   docker exec -it ollama ollama pull qwen3.6:35b
  #   scripts/rebuild-agent-llm.sh qwen3.6:35b
  #
  # ⚠️ Avec un modèle fortement quantisé (ex. IQ2_M), des pénalités
  # anti-répétition trop agressives (repeat_penalty/repeat_last_n/
  # presence_penalty élevés) sont contre-productives : elles interdisent au
  # modèle de réutiliser des mots sur une longue fenêtre, ce qui le force à
  # piocher un vocabulaire toujours plus rare et le fait dériver vers de
  # l'incohérence — sans jamais produire de tool_calls, jusqu'à saturer tout
  # le contexte (voir README, tableau des bugs, où cette cause a été
  # confirmée par comparaison d'horodatages puis rejeu de la tâche cassée).
  # Ce réglage vit dans le store Ollama du conteneur (volume ollama-data),
  # pas dans ce repo, et un `ollama pull`/`cp` refait à la main l'écrase :
  # scripts/rebuild-agent-llm.sh fige la recette (repeat_penalty 1.05,
  # repeat_last_n 256, presence_penalty 0) pour la réappliquer à l'identique
  # quel que soit le modèle source, y compris après un changement de modèle
  # puis un retour au modèle actuel.
  #
  # ⚠️ Testé aussi avec qwen3.6:35b-a3b (non quantisé, 21,45 Go) sur une GPU
  # 16 Go : tient pour du texte pur, mais OOM (~248 Mio manquants) dès qu'une
  # image (screen_shot GhostDesk) entre dans le contexte — le buffer de
  # l'encodeur vision (mtmd) n'est alloué qu'à ce moment-là, après que poids
  # + KV cache + compute buffer texte ont déjà quasi saturé la VRAM. Ni
  # réduire `num_gpu` manuellement (contre-productif : casse le partage
  # GPU/CPU automatique d'Ollama, qui gère déjà ~13 Go réels en VRAM sur les
  # 21,45 Go du modèle), ni réduire `OLLAMA_CONTEXT_LENGTH` à 8192, ni
  # flash-attention + cache K/V q8_0 n'ont suffi à combler ce déficit. À
  # retester quand plus de VRAM sera disponible plutôt que de continuer à
  # ajuster ces réglages sur 16 Go.
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    environment:
      # Par défaut, Ollama choisit une taille de contexte selon la VRAM
      # disponible (4096 tokens observé ici) — trop court dès qu'une image
      # (tokens visuels) s'ajoute à l'historique : "request (4713 tokens)
      # exceeds the available context size (4096 tokens)" en conditions
      # réelles avec GhostDesk/screen_shot. Relevé explicitement.
      - OLLAMA_CONTEXT_LENGTH=16384
    volumes:
      - ollama-data:/root/.ollama
      # Réutilise un dossier de modèles Ollama existant sur l'hôte (blobs/ +
      # manifests/ à la racine, structure attendue par Ollama sous .../models)
      # au lieu de re-télécharger. Optionnel : si absent, Ollama stocke ses
      # modèles dans le volume nommé ollama-models (déclaré plus bas).
      - ${OLLAMA_MODELS_HOST_PATH:-ollama-models}:/root/.ollama/models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    networks:
      - agent-net
    # décommenter pour piloter Ollama (pull, etc.) depuis l'hôte sans docker exec
    # ports:
    #   - "11434:11434"

networks:
  agent-net:
    driver: bridge

volumes:
  open-webui-data:
  qdrant-data:
  ghostdesk-home:
  ollama-data:
  ollama-models:
